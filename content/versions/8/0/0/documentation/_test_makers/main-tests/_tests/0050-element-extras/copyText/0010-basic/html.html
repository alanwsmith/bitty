<[@ d.bitty_tag @] data-connect="$CLASS_NAME"></[@ d.bitty_tag @]>
<p>
  NOTE: This example is run manually because it
  uses the operating systems copy/paste system.
  Click inside the input field (which fires
  the 'input' event) and the value will
  be copied to your system copy/paste
  mechanism.
</p>
<input 
  data-send="test_$SIGNAL_NAME"
  id="$STYLE_NAME"
  value="value from $HASH" 
  data-receive="test_$SIGNAL_NAME"
/>
<button data-send="test_$SIGNAL_NAME">Run Test</button>
<div class="manual-test" data-receive="verify_$SIGNAL_NAME">--</div>
