<[@ d.bitty_tag @] data-connect="ClassC6EF3"></[@ d.bitty_tag @]>
<p>
  NOTE: This example is run manually because it
  uses the operating systems copy/paste system.
  Click inside the input field (which fires
  the 'input' event) and the value will
  be copied to your system copy/paste
  mechanism.
</p>
<input 
  data-send="test_signal_C6EF3"
  id="el-C6EF3"
  value="value from C6EF3" 
  data-receive="test_signal_C6EF3"
/>
<button data-send="test_signal_C6EF3">Run Test</button>
<div class="manual-test" data-receive="verify_signal_C6EF3">--</div>
