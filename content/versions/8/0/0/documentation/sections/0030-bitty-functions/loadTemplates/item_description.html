[! filter markdown|safe !]
- [x] Fetches a URL to get templates from. 
- [x] Each `<script>` tag on the page is processed to determeine if it's a template. 
- [] Any `<script>` tags with a type of `tetx/html` and an `id` attribute is used for an HTML template. 
- [] Any `<script>` tags with a type of `image/svg` and an `id` attribute is used for an SVG template. 
- [] Any `<script>` tags with a type of `application/json` and an `id` is stored as data. 
- [] HTML templates are stored as strings inside the `b.templates` object with the `id` acting as the key in the object. 
- [] SVG templates are stored as strings inside the `b.svgs` object with the `id` acting as the key in the object. 
- [] The `application/json` strings are run through `JSON.parse()` and stored inside `b.data` if the string parses successfully. 
- [x] Options can be passed to the fetch call with the optional section argument. 
- [] The source file that's being fetched shouldn't be a full HTML file. It should only contain one or more script tags that are all siblings of each other. 
[! endfilter !]
