<ul>
<li>[x] Fetches a JSON from a URL.</li>
<li>[] Returns the JSON object if the fetch succeeds and the response parses as JSON.</li>
<li>[] Returns undefined if either the fetch fails or the JSON fails to parse.</li>
<li>[] Accepts and optional options object which is passed to the fetch call (e.g. for headers).</li>
</ul>
