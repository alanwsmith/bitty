<ul>
<li><code>preventDefault()</code> is applied unless otherwise specified.</li>
<li>If <code>preventDefault()</code> occurs for any key via <code>mapKey()</code> it affects all the other uses of that key
(i.e. trying to use <code>preventDefault()</code> for a key in one place and not in another causes
a race condition with undefined behaviour).</li>
</ul>
