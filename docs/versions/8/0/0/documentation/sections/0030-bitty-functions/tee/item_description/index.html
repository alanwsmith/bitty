<ul>
<li>The <code>b.tee()</code> method is modeled after the <code>tee</code> command line tool.</li>
<li>Input sent to see is returned without modification.</li>
<li>By default, the input is also sent to <code>content.log</code>.</li>
<li>The log output can be turned off by setting the second argument to <code>false</code> or <code>0</code>.</li>
</ul>
