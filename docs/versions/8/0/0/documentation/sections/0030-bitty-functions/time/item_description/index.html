<ul>
<li>Outputs a timestamp in the format YYYY-MM-DDTHH:MM:SS for the current locale.</li>
<li>The hour in <code>HH</code> is based of a 24 hour clock (e.g. 3PM is <code>15</code>).</li>
<li>If a <code>Date</code> is passed to the function the output is based off it.</li>
<li>If no argument is provided the function uses <code>new Date()</code> for the time.</li>
</ul>
