<ul>
<li><code>b.randomInt(min, max)</code> provides a random integers between
the min and max values.</li>
<li>Min and max can be positive or negative.</li>
<li>The values are inclusive. (e.g. 1, 6 mimics a dice roll).</li>
<li><code>b.randomFloat(min, max)</code> does the same thing, but returns a float value.</li>
</ul>
