<ul>
<li>The <code>&lt;button&gt;</code> element has no explicit text. The <code>on</code> and <code>off</code>
strings come from <code>:before</code> and <code>:after</code> in the
CSS. The goal it to provide the status of the button
to screen readers with the <code>aria-checked</code> value that
accompanies the <code>role=&quot;switch&quot;</code> attribute.</li>
</ul>
